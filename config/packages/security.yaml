security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt)/
            security: false
        api:
            pattern: ^/api/
            stateless: true
            jwt: ~

    access_control:
        - { path: ^/api/auth/login,           roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/refresh,         roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/logout,          roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/forgot-password, roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/reset-password,  roles: PUBLIC_ACCESS }
        - { path: ^/api/admin,                roles: ROLE_ADMIN }
        - { path: ^/api/,                     roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
